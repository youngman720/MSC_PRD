name: Weekly indie update

# Re-push to force GitHub to (re-)index this workflow if it wasn't picked up initially.
on:
  schedule:
    - cron: "0 3 * * 1" # every Monday 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Fetch this week's songs
        run: npm run fetch

      - name: Commit updated song data
        run: |
          git config user.name "indie-weekly-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/weekly
          git diff --cached --quiet && echo "No new song data to commit" || git commit -m "data: weekly song update $(date -u +%F)"
          git push

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Post weekly YouTube playlist
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          SITE_URL: ${{ steps.deployment.outputs.page_url }}
        run: npm run upload-youtube
